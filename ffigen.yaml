name: AsterixEngineBindings
description: Generated bindings for the versioned Asterix engine C ABI.
output: lib/native/generated/engine_bindings.dart
exclude-all-by-default: true
headers:
  entry-points:
    - engine/include/asterix/engine.h
functions:
  include:
    - asterix_engine_.*
structs:
  include:
    - Asterix.*
typedefs:
  include:
    - Asterix.*
macros:
  include:
    - ASTERIX_.*
preamble: |
  // Generated by `make ffi-generate`. Do not edit manually.
