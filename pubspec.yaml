name: asterix_xxl
description: "Native macOS shell for the Asterix & Obelix XXL reimplementation."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  crypto: ^3.0.6
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.3
  flutter_bloc: ^9.1.1
  freezed_annotation: ^3.1.0
  get_it: ^9.2.1
  injectable: ^3.0.0
  ffi: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.15.1
  freezed: ^3.2.5
  injectable_generator: ^3.0.2
  ffigen: ^20.1.1

flutter:
  uses-material-design: true
